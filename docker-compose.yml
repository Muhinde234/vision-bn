# Full-stack compose — API + PostgreSQL + Redis + Nginx
# Usage:
#   docker compose --env-file .env.production up --build -d

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       visiondx
      POSTGRES_USER:     visiondx
      POSTGRES_PASSWORD: ${DB_PASSWORD:-StrongPass123}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visiondx"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI ─────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL:          postgresql+asyncpg://visiondx:${DB_PASSWORD:-StrongPass123}@db:5432/visiondx
      SYNC_DATABASE_URL:     postgresql+psycopg2://visiondx:${DB_PASSWORD:-StrongPass123}@db:5432/visiondx
      REDIS_URL:             redis://redis:6379/0
      CELERY_BROKER_URL:     redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - uploads:/app/uploads
      - ./malaria:/app/malaria
      - ./models:/app/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"

  # ── Celery worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL:          postgresql+asyncpg://visiondx:${DB_PASSWORD:-StrongPass123}@db:5432/visiondx
      SYNC_DATABASE_URL:     postgresql+psycopg2://visiondx:${DB_PASSWORD:-StrongPass123}@db:5432/visiondx
      REDIS_URL:             redis://redis:6379/0
      CELERY_BROKER_URL:     redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker -Q inference,celery --loglevel=info --concurrency=2

  # ── Celery Flower ───────────────────────────────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
    ports:
      - "127.0.0.1:5555:5555"
    depends_on:
      - redis
    command: celery -A app.tasks.celery_app flower --port=5555

  # ── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/app/uploads:ro
    depends_on:
      - api

volumes:
  pg_data:
  uploads:
